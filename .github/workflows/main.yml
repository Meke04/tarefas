
name: Pipeline CI/CD

on: 
  push:
    branches:
      - master
    paths:
      - "src/**"
      - ".github/workflows/**"
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: instalção das dependencias
        run: npm install

      - name: rodar o build
        run: npm run build
        
  tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: instalação das dependencias
        run: npm install

      - name: rodar lint
        run: npm run lint

      - name: rodar tests
        run: npm run test
        
  deploy:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: instalação vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy pra vercel
        run: vercel --prod --yes --token=${{secrets.VERCEL_TOKEN}}
        env:
          VERCEL_ORG_ID: ${{secrets.VERCEL_ORG_ID}}
          VERCEL_PROJECT_ID: ${{secrets.VERCEL_PROJECT_ID}}
