
name: Pipeline CI/CD

on: 
  push:
    branches:
      - master
    paths:
      - "src/**"
      - ".github/workflows/**"
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: instalção das dependencias
        run: npm install

      - name: rodar o build
        run: npm run build
        
  tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: instalção das dependencias
        run: npm install

      - name: rodar lint
        run: npm run lint

      - name: rodar tests
        run: npm run test
